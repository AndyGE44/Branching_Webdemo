id: inventory
name: Inventory Service
description: Parts, stock levels, reservations, and reorder actions.

runtime:
  type: checkpoint_exec
  command: "python -m uvicorn agent_safe_demo.app_plane.inventory_service.app:app --host ${HOST} --port ${PORT}"
  cwd: "/"
  port_env: "PORT"
  health_path: "/api/state"
  ui_path: "/"

build:
  dockerfile_dir: "."

state:
  files:
    - "demo_inventory.db"
  env:
    DEMO_INVENTORY_DB_PATH: "/demo_inventory.db"

observability:
  state_summary_path: "/api/state"
