id: email
name: Email Service
description: Mailbox, labels, folders, and draft replies.

runtime:
  type: checkpoint_exec
  command: "python -m uvicorn agent_safe_demo.app_plane.email_service.app:app --host ${HOST} --port ${PORT}"
  cwd: "/"
  port_env: "PORT"
  health_path: "/api/state"
  ui_path: "/"

build:
  dockerfile_dir: "."

state:
  files:
    - "demo_mailbox.db"
  env:
    DEMO_MAILBOX_DB_PATH: "/demo_mailbox.db"

observability:
  state_summary_path: "/api/state"
