<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>State-Fork Control Panel</title>
    <link rel="stylesheet" href="/static/styles.css?v=29" />
  </head>
  <body>
    <div class="workspace">
      <!-- Main stage: the shop website fills the screen. -->
      <main class="stage">
        <iframe id="runtimeFrame" title="Shop website"></iframe>

        <div id="buildingOverlay" class="building-overlay">
          <div class="building-card">
            <div class="spinner" aria-hidden="true"></div>
            <strong id="buildingTitle">Building Workspace</strong>
            <p id="buildingHint">Starting the shop website. A cold start can take up to a minute.</p>
          </div>
        </div>

        <!-- Shown only when the rail is collapsed, to bring it back. -->
        <button id="railShow" class="rail-show" type="button" title="Show controls">‹ Controls</button>
      </main>

      <!-- Collapsible right control rail. -->
      <aside id="rail" class="rail">
        <img class="lab-logo" src="/static/daplab_logo_horiz.png?v=4" alt="DAP Lab" />

        <header class="rail-head">
          <div class="brand">
            <h1>State-Fork Control Panel</h1>
          </div>
          <button id="railHide" class="rail-hide" type="button" title="Hide controls">›</button>
        </header>

        <label class="app-select-label">
          Shop
          <select id="appSelect"></select>
        </label>

        <div class="rail-status">
          <span id="workspaceState" class="backend-pill">Waypoint Backend</span>
          <span id="lastResult" class="result-pill">Ready</span>
        </div>

        <label class="snapshot-input">
          Snapshot
          <input id="snapshotLabelInput" type="text" maxlength="80" placeholder="before agent" />
        </label>
        <div class="control-actions">
          <button id="aiPickBtn" class="ai-pick-btn" type="button">AI Pick</button>
          <button id="snapshotBtn" class="primary" type="button">Snapshot</button>
          <button id="resetBtn" class="danger" type="button">Reset</button>
        </div>

        <section class="rail-section">
          <div class="panel-header">
            <div>
              <h2>Snapshots</h2>
              <p class="muted">Current runtime snapshots</p>
            </div>
          </div>
          <div id="checkpoints" class="branch-list"></div>
        </section>
      </aside>
    </div>

    <!-- AI Pick: scripted chat that demos restore → fill cart → snapshot. -->
    <div id="aiPickModal" class="ai-modal" hidden>
      <div class="ai-chat" role="dialog" aria-modal="true" aria-label="AI stylist">
        <header class="ai-chat-head">
          <span class="ai-avatar">AI</span>
          <div class="ai-chat-title">
            <strong>AI Stylist</strong>
            <span class="muted">demo · powered by State-Fork</span>
          </div>
          <button id="aiPickClose" class="ai-close" type="button" title="Close" aria-label="Close">✕</button>
        </header>
        <div id="aiChatBody" class="ai-chat-body"></div>
        <div id="aiChatChoices" class="ai-choices"></div>
      </div>
    </div>

    <script src="/static/app.js?v=32"></script>
  </body>
</html>
