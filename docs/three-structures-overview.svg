<svg viewBox="0 0 680 1015" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Three Dolt data-tier placements compared</title>
<desc>For #1 coupled, #2 full-system and #3 external: how each connects to the database, how it snapshots and restores, and what it stores in RAM versus on disk, with latency and throughput.</desc>
<defs>
<style>
  text{font-family:ui-sans-serif,system-ui,Helvetica,Arial,sans-serif}
  .t,.ts,.th{fill:#2C2C2A}
  .c-blue rect,.c-blue ellipse{fill:#E6F1FB;stroke:#185FA5;stroke-width:1}
  .c-blue text{fill:#0C447C}
  .c-coral rect,.c-coral ellipse{fill:#FAECE7;stroke:#993C1D;stroke-width:1}
  .c-coral text{fill:#712B13}
  .c-teal rect,.c-teal ellipse{fill:#E1F5EE;stroke:#0F6E56;stroke-width:1}
  .c-teal text{fill:#085041}
  .c-gray rect,.c-gray ellipse{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:1}
  .c-gray text{fill:#444441}
</style>
<marker id="arB" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#378ADD"/></marker>
<marker id="arC" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#D85A30"/></marker>
<marker id="arT" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1D9E75"/></marker>
<marker id="arG" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888780"/></marker>
</defs>

<rect x="0" y="0" width="680" height="1015" fill="#FFFFFF"/>

<text class="th" x="16" y="24" font-size="18" font-weight="700">Three Dolt placements — connect · checkpoint · store</text>
<text class="ts" x="16" y="43" font-size="12">What sits inside the StateFork checkpoint sets latency, storage, and whether the app must reconnect.</text>

<text class="ts" x="120" y="62" font-size="11" font-weight="700" text-anchor="middle">① CONNECT TO DB</text>
<text class="ts" x="346" y="62" font-size="11" font-weight="700" text-anchor="middle">② SNAPSHOT / RESTORE</text>
<text class="ts" x="566" y="62" font-size="11" font-weight="700" text-anchor="middle">③ STORAGE (RAM vs disk)</text>

<!-- ============================ LANE 1 : #1 COUPLED ============================ -->
<g class="c-blue"><rect x="8" y="72" width="664" height="28" rx="6"/>
<text class="t" x="18" y="91" font-size="13" font-weight="700">①  #1 Coupled</text>
<text class="ts" x="150" y="91" font-size="12">repo files in the checkpoint · no DB server</text></g>

<text class="ts" x="16" y="146" font-size="10">StateFork checkpoint</text>
<rect x="14" y="150" width="150" height="150" rx="10" fill="none" stroke="#888780" stroke-width="1.4" stroke-dasharray="5 4"/>
<g class="c-blue"><rect x="116" y="116" width="96" height="26" rx="6"/><text class="t" x="164" y="133" font-size="11" text-anchor="middle">dolt CLI</text></g>
<g class="c-gray"><ellipse cx="62" cy="210" rx="40" ry="9"/><rect x="22" y="210" width="80" height="40"/><ellipse cx="62" cy="250" rx="40" ry="9"/><text class="ts" x="62" y="234" font-size="10" text-anchor="middle">.dolt files</text></g>
<path d="M150,146 C120,160 100,184 84,200" fill="none" stroke="#378ADD" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arB)"/>
<text class="ts" x="120" y="174" font-size="9">process / query</text>
<text class="ts" x="14" y="318" font-size="10.5">CLI cold-opens files — no connection.</text>

<g class="c-blue"><rect x="240" y="114" width="212" height="74" rx="8"/>
<text class="t" x="250" y="134" font-size="11" font-weight="700">SNAPSHOT</text>
<text class="ts" x="250" y="153" font-size="10.5">Waypoint fs snapshot</text>
<text class="ts" x="250" y="171" font-size="10.5">copies changed files → disk</text></g>
<g class="c-blue"><rect x="240" y="196" width="212" height="74" rx="8"/>
<text class="t" x="250" y="216" font-size="11" font-weight="700">RESTORE</text>
<text class="ts" x="250" y="235" font-size="10.5">roll files back to snapshot</text>
<text class="ts" x="250" y="253" font-size="10.5">no connection to reopen</text></g>

<g class="c-gray"><rect x="460" y="114" width="212" height="58" rx="8"/>
<text class="t" x="470" y="134" font-size="11" font-weight="700">IN RAM</text>
<text class="ts" x="470" y="155" font-size="10.5">none — fs-only snapshot</text></g>
<g class="c-blue"><rect x="460" y="180" width="212" height="58" rx="8"/>
<text class="t" x="470" y="200" font-size="11" font-weight="700">ON DISK</text>
<text class="ts" x="470" y="221" font-size="10.5">repo delta · 17.6 MB @1M</text></g>
<text class="ts" x="460" y="258" font-size="10.5" font-weight="600">Σ/snapshot @1M ≈ 17.6 MB · grows</text>

<line x1="8" y1="320" x2="672" y2="320" stroke="#B4B2A9" stroke-width="1"/>
<text class="ts" x="120" y="340" font-size="11" text-anchor="middle">SNAPSHOT  <tspan font-weight="700">12 ms</tspan></text>
<text class="ts" x="346" y="340" font-size="11" text-anchor="middle">RESTORE  <tspan font-weight="700">14 ms</tspan></text>
<text class="ts" x="566" y="340" font-size="11" text-anchor="middle">WRITES  <tspan font-weight="700">22 ops/s</tspan></text>

<!-- ============================ LANE 2 : #2 FULL-SYSTEM ============================ -->
<g class="c-coral"><rect x="8" y="388" width="664" height="28" rx="6"/>
<text class="t" x="18" y="407" font-size="13" font-weight="700">②  #2 Full-system</text>
<text class="ts" x="184" y="407" font-size="12">server + app + connection all inside · CRIU</text></g>

<text class="ts" x="16" y="462" font-size="10">checkpoint (CRIU) — all inside</text>
<rect x="14" y="466" width="150" height="152" rx="10" fill="none" stroke="#888780" stroke-width="1.4" stroke-dasharray="5 4"/>
<g class="c-coral"><rect x="30" y="476" width="120" height="24" rx="6"/><text class="t" x="90" y="492" font-size="11" text-anchor="middle">app client</text></g>
<g class="c-coral"><rect x="30" y="512" width="120" height="26" rx="6"/><text class="t" x="90" y="529" font-size="11" text-anchor="middle">dolt server</text></g>
<line x1="90" y1="500" x2="90" y2="512" stroke="#D85A30" stroke-width="2" marker-end="url(#arC)"/>
<text class="ts" x="156" y="508" font-size="9">warm conn</text>
<g class="c-gray"><ellipse cx="70" cy="560" rx="38" ry="8"/><rect x="32" y="560" width="76" height="34"/><ellipse cx="70" cy="594" rx="38" ry="8"/><text class="ts" x="70" y="582" font-size="10" text-anchor="middle">.dolt</text></g>
<line x1="90" y1="538" x2="84" y2="552" stroke="#D85A30" stroke-width="1.6" marker-end="url(#arC)"/>
<text class="ts" x="14" y="634" font-size="10.5">app + server + live TCP frozen together.</text>

<g class="c-coral"><rect x="240" y="430" width="212" height="74" rx="8"/>
<text class="t" x="250" y="450" font-size="11" font-weight="700">SNAPSHOT</text>
<text class="ts" x="250" y="469" font-size="10.5">CRIU dumps everything</text>
<text class="ts" x="250" y="487" font-size="10.5">RAM + app + TCP + repo</text></g>
<g class="c-coral"><rect x="240" y="512" width="212" height="74" rx="8"/>
<text class="t" x="250" y="532" font-size="11" font-weight="700">RESTORE</text>
<text class="ts" x="250" y="551" font-size="10.5">restore whole session</text>
<text class="ts" x="250" y="569" font-size="10.5" font-weight="700">resumes — no reconnect, warm</text></g>

<g class="c-coral"><rect x="460" y="430" width="212" height="58" rx="8"/>
<text class="t" x="470" y="450" font-size="11" font-weight="700">IN RAM</text>
<text class="ts" x="470" y="471" font-size="10.5">server + app + TCP · 94 MB</text></g>
<g class="c-coral"><rect x="460" y="496" width="212" height="58" rx="8"/>
<text class="t" x="470" y="516" font-size="11" font-weight="700">ON DISK</text>
<text class="ts" x="470" y="537" font-size="10.5">repo overlay · 41 MB @1M</text></g>
<text class="ts" x="460" y="574" font-size="10.5" font-weight="600">Σ/snapshot @1M ≈ 135 MB · grows</text>

<line x1="8" y1="636" x2="672" y2="636" stroke="#B4B2A9" stroke-width="1"/>
<text class="ts" x="120" y="656" font-size="11" text-anchor="middle">SNAPSHOT  <tspan font-weight="700">441 ms</tspan></text>
<text class="ts" x="346" y="656" font-size="11" text-anchor="middle">RESTORE  <tspan font-weight="700">380 ms</tspan></text>
<text class="ts" x="566" y="656" font-size="11" text-anchor="middle">WRITES  <tspan font-weight="700">1,452 ops/s</tspan></text>

<!-- ============================ LANE 3 : #3 EXTERNAL ============================ -->
<g class="c-teal"><rect x="8" y="704" width="664" height="28" rx="6"/>
<text class="t" x="18" y="723" font-size="13" font-weight="700">③  #3 External (arch A)</text>
<text class="ts" x="220" y="723" font-size="12">server + data outside · Dolt branches version data</text></g>

<text class="ts" x="16" y="778" font-size="10">checkpoint · app only</text>
<rect x="14" y="782" width="104" height="140" rx="10" fill="none" stroke="#888780" stroke-width="1.4" stroke-dasharray="5 4"/>
<g class="c-teal"><rect x="26" y="842" width="80" height="26" rx="6"/><text class="t" x="66" y="859" font-size="11" text-anchor="middle">app</text></g>
<g class="c-teal"><rect x="132" y="812" width="94" height="26" rx="6"/><text class="t" x="179" y="829" font-size="11" text-anchor="middle">dolt server</text></g>
<g class="c-gray"><ellipse cx="172" cy="860" rx="34" ry="8"/><rect x="138" y="860" width="68" height="32"/><ellipse cx="172" cy="892" rx="34" ry="8"/><text class="ts" x="172" y="881" font-size="9.5" text-anchor="middle">branches</text></g>
<line x1="106" y1="852" x2="132" y2="830" stroke="#1D9E75" stroke-width="2" marker-end="url(#arT)"/>
<line x1="179" y1="838" x2="175" y2="850" stroke="#1D9E75" stroke-width="1.6" marker-end="url(#arT)"/>
<text class="ts" x="70" y="912" font-size="9.5" font-weight="700">↻ reconnect</text>
<text class="ts" x="14" y="938" font-size="10.5">data outside · Dolt branch/reset versions it.</text>

<g class="c-teal"><rect x="240" y="746" width="212" height="74" rx="8"/>
<text class="t" x="250" y="766" font-size="11" font-weight="700">SNAPSHOT</text>
<text class="ts" x="250" y="785" font-size="10.5">Dolt commit + branch</text>
<text class="ts" x="250" y="803" font-size="10.5">+ tiny app · data stays out</text></g>
<g class="c-teal"><rect x="240" y="828" width="212" height="74" rx="8"/>
<text class="t" x="250" y="848" font-size="11" font-weight="700">RESTORE</text>
<text class="ts" x="250" y="867" font-size="10.5">Dolt reset --hard to branch</text>
<text class="ts" x="250" y="885" font-size="10.5">restore app, then reconnect ↻</text></g>

<g class="c-gray"><rect x="460" y="746" width="212" height="58" rx="8"/>
<text class="t" x="470" y="766" font-size="11" font-weight="700">IN RAM</text>
<text class="ts" x="470" y="787" font-size="10.5">none — stays in live server</text></g>
<g class="c-teal"><rect x="460" y="812" width="212" height="58" rx="8"/>
<text class="t" x="470" y="832" font-size="11" font-weight="700">ON DISK</text>
<text class="ts" x="470" y="853" font-size="10.5">Dolt delta · 0.07 MB @1M</text></g>
<text class="ts" x="460" y="890" font-size="10.5" font-weight="600">Σ/snapshot @1M ≈ 0.07 MB · flat</text>

<line x1="8" y1="952" x2="672" y2="952" stroke="#B4B2A9" stroke-width="1"/>
<text class="ts" x="120" y="972" font-size="11" text-anchor="middle">SNAPSHOT  <tspan font-weight="700">40 ms</tspan></text>
<text class="ts" x="346" y="972" font-size="11" text-anchor="middle">RESTORE  <tspan font-weight="700">35 ms</tspan></text>
<text class="ts" x="566" y="972" font-size="11" text-anchor="middle">WRITES  <tspan font-weight="700">1,435 ops/s</tspan></text>
</svg>
